name: Publish CLI Image

on:
  release:
    types: [published]

jobs:
  check-tag:
    name: Check tag prefix
    runs-on: ubuntu-latest
    outputs:
      is-cli:  ${{ steps.check.outputs.is-cli }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - id: check
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == cli/v* ]]; then
            echo "is-cli=true"           >> $GITHUB_OUTPUT
            echo "version=${TAG#cli/v}"  >> $GITHUB_OUTPUT
          else
            echo "is-cli=false"          >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish GHCR CLI Image
    needs: check-tag
    if: needs.check-tag.outputs.is-cli == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/krusty93/sunnysunday.cli
          tags: |
            type=raw,value=${{ needs.check-tag.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cli
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/krusty93/sunnysunday.cli
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Show verify command
        run: |
          echo "Verify with:"
          echo "gh attestation verify oci://ghcr.io/krusty93/sunnysunday.cli@${{ steps.build.outputs.digest }} --owner Krusty93"
