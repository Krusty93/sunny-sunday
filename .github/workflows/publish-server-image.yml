name: Publish Server Image

on:
  release:
    types: [published]

jobs:
  check-tag:
    name: Check tag prefix
    runs-on: ubuntu-latest
    outputs:
      is-server: ${{ steps.check.outputs.is-server }}
      version:   ${{ steps.check.outputs.version }}
    steps:
      - id: check
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == server/v* ]]; then
            echo "is-server=true"          >> $GITHUB_OUTPUT
            echo "version=${TAG#server/v}" >> $GITHUB_OUTPUT
          else
            echo "is-server=false"         >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish GHCR Server Image
    needs: check-tag
    if: needs.check-tag.outputs.is-server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: ghcr.io/krusty93/sunnysunday.server
      DESCRIPTION: "Periodic notes recaps, on your Kindle"
      AUTHORS: "Krusty93"
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ needs.check-tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.check-tag.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.check-tag.outputs.version }}
            type=ref,event=branch,enable={{is_not_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
            org.opencontainers.image.authors=${{ env.AUTHORS }}
            org.opencontainers.image.url=github.com/${{ env.REPOSITORY }}
            org.opencontainers.image.source=https://github.com/${{ env.REPOSITORY }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: 0 # https://docs.docker.com/build/ci/github-actions/reproducible-builds/
        with:
          context: .
          file: Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Show verify command
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "Verify with:"
          echo "gh attestation verify oci://$IMAGE_NAME@$DIGEST --owner Krusty93"
