name: Publish Server Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Tag to publish, for example server/v1.2.3
        required: true
        type: string
  release:
    types: [published]

jobs:
  check-tag:
    name: Check tag prefix
    runs-on: ubuntu-latest
    outputs:
      is-server: ${{ steps.check.outputs.is-server }}
      version:   ${{ steps.check.outputs.version }}
    steps:
      - id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.version }}"
          if [[ "$TAG" == server/v* ]]; then
            echo "is-server=true"          >> $GITHUB_OUTPUT
            echo "version=${TAG#server/v}" >> $GITHUB_OUTPUT
          else
            echo "is-server=false"         >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish GHCR Server Image
    needs: check-tag
    if: needs.check-tag.outputs.is-server == 'true'
    uses: ./.github/workflows/publish-image-reusable.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: ghcr.io/krusty93/sunnysunday.server
      dockerfile: Dockerfile.server
      version: ${{ needs.check-tag.outputs.version }}
      description: Periodic notes recaps, on your Kindle
      authors: Krusty93
    secrets: inherit
