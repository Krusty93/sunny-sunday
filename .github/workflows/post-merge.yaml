name: Post-Merge

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-components:
    name: Tag changed components
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Discover Versioned Components
        id: discover
        uses: ./.github/actions/discover-versioned-components

      - name: Tag Component Versions
        env:
          COMPONENTS_JSON: ${{ steps.discover.outputs.components_json }}
        run: |
          set -e
          TAGGED=0

          while IFS= read -r component; do
            NAME=$(echo "$component" | jq -r '.name')
            CSPROJ=$(echo "$component" | jq -r '.csprojPath')

            [ -z "$NAME" ] && continue
            [ -z "$CSPROJ" ] || [ "$CSPROJ" = "null" ] && { echo "⚠️  $NAME: .csproj not configured, skipping"; continue; }
            [ ! -f "$CSPROJ" ] && { echo "⚠️  $NAME: $CSPROJ not found, skipping"; continue; }

            VERSION=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ" || echo "")
            [ -z "$VERSION" ] && { echo "⚠️  $NAME: <Version> not found, skipping"; continue; }

            TAG="${NAME}/v${VERSION}"

            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "✓ $NAME v$VERSION - tag already exists, nothing to do"
              continue
            fi

            echo "🚀 $NAME: creating tag $TAG"
            git tag -a "$TAG" -m "$NAME v$VERSION"
            TAGGED=1
            echo "  ✅ $TAG created"

          done < <(printf '%s' "$COMPONENTS_JSON" | jq -c '.[]')

          if [ $TAGGED -eq 1 ]; then
            git push origin --tags
            echo "Tags pushed."
          else
            echo "No new tags to push."
          fi
