name: Version Bump Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/actions/discover-versioned-components/**'
      - '.github/workflows/version-bump-check.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  version-bump-check:
    name: Version Bump Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Discover Versioned Components
        id: discover
        uses: ./.github/actions/discover-versioned-components

      - name: Check bumps and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMPONENTS_JSON: ${{ steps.discover.outputs.components_json }}
        run: |
          set -e

          CHANGED=$(git diff --name-only origin/main...HEAD)

          REPORT=""
          FAILED=0
          MISSING_BUMPS=""

          append_report_row() {
            local row="$1"

            if [ -n "$REPORT" ]; then
              REPORT="${REPORT}\n${row}"
            else
              REPORT="$row"
            fi
          }

          while IFS= read -r component; do
            NAME=$(echo "$component" | jq -r '.name')
            COMP_PATH=$(echo "$component" | jq -r '.projectPath')
            CSPROJ=$(echo "$component" | jq -r '.csprojPath')

            [ -z "$NAME" ] && continue

            if ! echo "$CHANGED" | grep -q "^${COMP_PATH}/"; then
              append_report_row "| \`${NAME}\` | - | - | âŹ­ď¸Ź Not modified |"
              continue
            fi

            if [ -z "$CSPROJ" ] || [ "$CSPROJ" = "null" ] || [ ! -f "$CSPROJ" ]; then
              append_report_row "| \`${NAME}\` | - | - | âť“ ${CSPROJ} not found |"
              FAILED=1; continue
            fi

            PR_VERSION=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ" || echo "")
            MAIN_VERSION=$(git show origin/main:"$CSPROJ" 2>/dev/null \
              | grep -oP '(?<=<Version>)[^<]+' || echo "0.0.0")

            if [ -z "$PR_VERSION" ]; then
              append_report_row "| \`${NAME}\` | \`${MAIN_VERSION}\` | - | âťŚ \`<Version>\` tag missing |"
              FAILED=1; continue
            fi

            LOWER=$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | head -1)

            if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
              append_report_row "| \`${NAME}\` | \`${MAIN_VERSION}\` | \`${PR_VERSION}\` | âťŚ Not bumped |"
              MISSING_BUMPS="${MISSING_BUMPS}# bump ${NAME} before opening PR â€” edit <Version> in ${CSPROJ}\n"
              FAILED=1
            elif [ "$LOWER" = "$PR_VERSION" ]; then
              append_report_row "| \`${NAME}\` | \`${MAIN_VERSION}\` | \`${PR_VERSION}\` | âťŚ Version regressed |"
              FAILED=1
            else
              append_report_row "| \`${NAME}\` | \`${MAIN_VERSION}\` | \`${PR_VERSION}\` | âś… OK |"
            fi
          done < <(printf '%s' "$COMPONENTS_JSON" | jq -c '.[]')

          if [ $FAILED -eq 0 ]; then
            SUMMARY="âś… **All modified components have been version bumped.**"
            HINT=""
          else
            SUMMARY="âťŚ **One or more modified components are missing a version bump.**"
            HINT="\n\nFor each failing component, edit the \`<Version>\` tag in the relevant \`.csproj\` file to a higher semver value, then push again:\n\`\`\`bash\n${MISSING_BUMPS}\`\`\`"
          fi

          BODY="### đź”– Version Bump Check\n\n${SUMMARY}${HINT}\n\n| Component | Version on \`main\` | Version in PR | Status |\n|---|---|---|---|\n${REPORT}\n\n---\n*Updated automatically on every push to this PR.*"

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("### đź”– Version Bump Check")) | .id' \
            | head -1)

          BODY_REAL=$(printf "%b" "$BODY")

          if [ -n "$EXISTING_ID" ]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              --field body="$BODY_REAL"
          else
            gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --field body="$BODY_REAL"
          fi

          [ $FAILED -eq 0 ] || exit 1
