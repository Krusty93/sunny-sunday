name: Publish CLI Image

'on':
  workflow_dispatch:
    inputs:
      version:
        description: Tag to publish, for example cli/v1.2.3
        required: true
        type: string
  release:
    types: [published]

jobs:
  check-tag:
    name: Check tag prefix
    runs-on: ubuntu-latest
    outputs:
      is-cli:  ${{ steps.check.outputs.is-cli }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - id: check
        run: |
          TAG="${{ github.event.release.tag_name || inputs.version }}"
          if [[ "$TAG" == cli/v* ]]; then
            echo "is-cli=true"           >> $GITHUB_OUTPUT
            echo "version=${TAG#cli/v}"  >> $GITHUB_OUTPUT
          else
            echo "is-cli=false"          >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish GHCR CLI Image
    needs: check-tag
    if: needs.check-tag.outputs.is-cli == 'true'
    uses: ./.github/workflows/publish-image-reusable.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      image_name: ghcr.io/krusty93/sunnysunday.cli
      dockerfile: Dockerfile.cli
      version: ${{ needs.check-tag.outputs.version }}
      description: Periodic notes recaps, on your Kindle
      authors: Krusty93
    secrets: inherit
